  glitchtip-postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - glitchtip-postgres-data:/var/lib/postgresql/data

  glitchtip-redis:
    image: redis:7-alpine
    restart: unless-stopped

  glitchtip-web:
    image: glitchtip/glitchtip:latest
    restart: unless-stopped
    depends_on:
      - glitchtip-postgres
      - glitchtip-redis
    env_file:
      - .env.glitchtip
    environment:
      DATABASE_URL: postgres://postgres@glitchtip-postgres:5432/postgres
      REDIS_URL: redis://glitchtip-redis:6379/1
      EMAIL_URL: consolemail://
      PORT: 8000
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-http://localhost:8095}
    ports:
      - "8095:8000"
    volumes:
      - glitchtip-uploads:/code/uploads

  glitchtip-worker:
    image: glitchtip/glitchtip:latest
    restart: unless-stopped
    depends_on:
      - glitchtip-postgres
      - glitchtip-redis
    env_file:
      - .env.glitchtip
    environment:
      DATABASE_URL: postgres://postgres@glitchtip-postgres:5432/postgres
      REDIS_URL: redis://glitchtip-redis:6379/1
      EMAIL_URL: consolemail://
      PORT: 8000
      SERVER_ROLE: worker
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-http://localhost:8095}
    volumes:
      - glitchtip-uploads:/code/uploads

  glitchtip-migrate:
    image: glitchtip/glitchtip:latest
    depends_on:
      - glitchtip-postgres
      - glitchtip-redis
    env_file:
      - .env.glitchtip
    environment:
      DATABASE_URL: postgres://postgres@glitchtip-postgres:5432/postgres
      REDIS_URL: redis://glitchtip-redis:6379/1
      EMAIL_URL: consolemail://
      PORT: 8000
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-http://localhost:8095}
    command: ./manage.py migrate
    volumes:
      - glitchtip-uploads:/code/uploads

  kafka_bu:
    image: apache/kafka:latest
    container_name: kafka_bu
    restart: unless-stopped
    networks:
      - tech_bu
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka_bu:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka_bu:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  kafka_ui_bu:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka_ui_bu
    restart: unless-stopped
    depends_on:
      - kafka_bu
    networks:
      - tech_bu
    ports:
      - "8083:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka_bu:9092
      KAFKA_CLUSTERS_0_READONLY: "false"
