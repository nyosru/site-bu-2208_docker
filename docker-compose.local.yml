networks:
  laravel:
    external: true
  tech_bu:

volumes:
  grafana_data:
  prometheus_data:
  glitchtip-postgres-data:
  glitchtip-uploads:
  kafka_data:

services:

  2208bu_site:
    container_name: 2208bu_site
    depends_on:
      db_bu:
        condition: service_healthy
    networks:
      - laravel
      - tech_bu

#    ports:
#      - "9000:9000"
    build:
      context: .
      dockerfile: docker.2208bu.Dockerfile
    working_dir: ${FOLDER_2208BU_SERV}

    environment:
      - PHPGROUP=www-data
      - PHPUSER=www-data
      - FOLDER=${FOLDER_2208BU_SERV}
    healthcheck:
      test: [ "CMD-SHELL", "php-fpm -t || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    volumes:
      - '${FOLDER_2208BU}:${FOLDER_2208BU_SERV}'

  2208bu_kafka_consumer:
    container_name: 2208bu_kafka_consumer
    depends_on:
      2208bu_site:
        condition: service_healthy
      kafka_bu:
        condition: service_started
    networks:
      - tech_bu
    build:
      context: .
      dockerfile: docker.2208bu.Dockerfile
    working_dir: ${FOLDER_2208BU_SERV}
    environment:
      - PHPGROUP=www-data
      - PHPUSER=www-data
      - FOLDER=${FOLDER_2208BU_SERV}
    command: [ "php", "artisan", "kafka:consume-advertisement-tasks" ]
    restart: unless-stopped
    volumes:
      - '${FOLDER_2208BU}:${FOLDER_2208BU_SERV}'

  db_bu:
    container_name: db_bu
    image: postgres:16.4
    networks:
      - tech_bu

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${MYSQL_DB_BU_ROOT_PASSWORD}
#    ports:
#      - "5432:5432"
    volumes:
      - '${MYSQL_DB_BU_FOLDER}:/var/lib/postgresql/data'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -h 127.0.0.1 -p 5432 || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  adminer_bu:
    image: adminer:latest
    container_name: adminer_bu
    restart: unless-stopped
    depends_on:
      db_bu:
        condition: service_healthy
    ports:
      - "8081:8080"
    networks:
      - tech_bu


  prometheus_bu:
    image: prom/prometheus:latest
    container_name: prometheus_bu
    restart: unless-stopped
    networks:
#      - laravel
      - tech_bu
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  grafana_bu:
    image: grafana/grafana:latest
    container_name: grafana_bu
    restart: unless-stopped
    networks:
#      - laravel
      - tech_bu

    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAPHANA_ADMIN_LOGIN}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAPHANA_ADMIN_PASS}
    volumes:
      - grafana_data:/var/lib/grafana


