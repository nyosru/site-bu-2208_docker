
networks:
  laravel:
    external: true

services:

  # Основной локальный сервис проекта 2208bu.
  2208bu:
    container_name: 2208bu
    depends_on:
      db_bu:
        condition: service_healthy
    networks:
      - laravel
    build:
      context: .
      dockerfile: docker.2208bu.Dockerfile
    working_dir: ${FOLDER_2208BU_SERV}
    environment:
      - PHPGROUP=www-data
      - PHPUSER=www-data
      - FOLDER=${FOLDER_2208BU_SERV}
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    volumes:
      - '${FOLDER_2208BU}:${FOLDER_2208BU_SERV}'


  # Локальная БД переведена на PostgreSQL; старый MySQL-стек ниже сохранён как reference.
  db_bu:
    container_name: db_bu
    image: postgres:16.4
    networks:
      - laravel
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${MYSQL_DB_BU_ROOT_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - '${MYSQL_DB_BU_FOLDER}:/var/lib/postgresql/data'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h 127.0.0.1 -p 5432 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped



